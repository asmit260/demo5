<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Infinity Dental Clinic</title>
  <!--
    IMPORTANT ORDER:
    1. Netlify Identity widget MUST be in <head>
    2. Decap CMS script MUST be at end of <body>
    Reversing this causes the "appendChild of null" blank-screen bug.
  -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!--
    Decap CMS mounts itself into the body at runtime.
    Place the script HERE (end of body) — NOT in <head>.
    Using cdn.jsdelivr.net which is more reliable than unpkg for large bundles.
  -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.2/dist/decap-cms.js"></script>
  <script>
    // After login via Netlify Identity, redirect to admin panel (not homepage)
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function (user) {
        if (!user) {
          window.netlifyIdentity.on('login', function () {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
